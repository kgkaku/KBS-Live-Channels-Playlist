name: KBS

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-kbs:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4
      
      - name: Decode and run KBS script
        env:
          KBS_PY: ${{ secrets.KBS_PY }}
        run: |
          echo "$KBS_PY" | base64 -d > kbs_fetcher.py
          python kbs_fetcher.py
      
      - name: Commit and push changes
        uses: EndBug/add-and-commit@v9
        with:
          add: 'channel_code.txt kbs-data.json kbs-extvlcopt.m3u'
          message: 'Update KBS data [skip ci]'
          default_author: github_actions
          push: true
